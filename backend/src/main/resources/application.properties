server.port=8000

spring.application.name=restaurant-management-system
# Supports MONGODB_URL (docs) or legacy MONGO_URL (previous Python backend)
spring.data.mongodb.uri=${MONGODB_URL:${MONGO_URL:mongodb://localhost:27017/}}
spring.data.mongodb.database=${DATABASE_NAME:tabserv}

app.jwt.secret-key=${SECRET_KEY:change-this-secret-key-in-production-use-at-least-32-chars}
app.jwt.algorithm=${ALGORITHM:HS256}
app.jwt.access-token-expire-minutes=${ACCESS_TOKEN_EXPIRE_MINUTES:30}

app.upload.menu-images-dir=uploads/menu_images

app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:admin123}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Administrator}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.jackson.serialization.write-dates-as-timestamps=false
